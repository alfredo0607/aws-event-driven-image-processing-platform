# /etc/nginx/conf.d/services-resize-image-api.conf
#
# Reverse-proxy para la API de procesamiento de imágenes.
# El contenedor Docker expone internamente 3000, mapeado al puerto 3001 del host.
#
# Para activar:
#   sudo cp services-resize-image-api.conf /etc/nginx/conf.d/
#   sudo certbot --nginx -d services-resize-image-api.alfredo.dominguez.com
#   sudo nginx -t && sudo systemctl reload nginx

# ── Redirigir HTTP → HTTPS ────────────────────────────────────────────────────
server {
    listen 80;
    server_name services-resize-image-api.alfredo.dominguez.com;

    return 301 https://$host$request_uri;
}

# ── HTTPS (443) ───────────────────────────────────────────────────────────────
# Certbot añade los bloques ssl_certificate / ssl_* automáticamente.
server {
    listen 443 ssl;
    server_name services-resize-image-api.alfredo.dominguez.com;

    # Proxy al contenedor Docker (host_port:3001 → container:3000)
    location / {
        proxy_pass          http://127.0.0.1:3001;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade            $http_upgrade;
        proxy_set_header    Connection         'upgrade';
        proxy_set_header    Host               $host;
        proxy_set_header    X-Real-IP          $remote_addr;
        proxy_set_header    X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto  $scheme;
        proxy_cache_bypass  $http_upgrade;
        proxy_read_timeout  90;

        # Subida de imágenes (máx 15 MB, igual que express-fileupload)
        client_max_body_size 15M;
    }
}
